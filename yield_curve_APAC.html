<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yield Curve Analysis · APAC</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/plotly.js/2.27.0/plotly.min.js"></script>
<style>
  :root{
    --bg:#0D1117; --panel:#161B22; --card:#21262D; --border:#30363D;
    --blue:#58A6FF; --orange:#F78166; --green:#3FB950; --purple:#BC8CFF;
    --grey:#8B949E; --grey-dim:#484F58; --white:#E6EDF3; --red:#F85149;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background:var(--bg); color:var(--white);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    padding:16px 26px;
  }
  h1{font-size:1.4rem; font-weight:700; margin-bottom:1px;}
  .subtitle{color:var(--grey); font-size:0.75rem; margin-bottom:10px;}

  /* Tabs */
  .tabs{display:flex; gap:8px; margin-bottom:14px;}
  .tab{
    background:var(--card); color:var(--grey); border:1px solid var(--border);
    border-radius:6px 6px 0 0; font-weight:600; font-size:0.82rem;
    padding:6px 18px; cursor:pointer; transition:all .15s;
  }
  .tab:hover{color:var(--white);}
  .tab.active{background:#1A2F4A; color:var(--blue);
    border-color:var(--blue); border-bottom:2px solid var(--blue);}

  /* Top row */
  .toprow{display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:8px;}
  .country-info{display:flex; align-items:center; gap:8px; padding-top:14px;}
  .country-name{color:var(--white); font-size:0.95rem; font-weight:700;}
  .cb-pill{border:1px solid; background:rgba(88,166,255,0.08);
    padding:1px 8px; border-radius:20px; font-size:0.65rem; font-weight:700;}
  .currency-note{color:var(--grey); font-size:0.72rem;}

  .dates{display:flex; flex-direction:column; gap:4px; align-items:flex-end;}
  .date-label{font-size:0.55rem; font-weight:700; letter-spacing:0.08em;
    text-transform:uppercase; margin-bottom:2px;}
  .date-box{background:var(--card); border:1px solid var(--border);
    border-radius:6px; padding:4px 10px; font-family:monospace;
    font-size:0.80rem; color:var(--white); font-weight:700; min-width:130px; text-align:center;}
  .date-box.hist{border-color:var(--orange);}
  .date-box.curr{border-color:var(--blue); cursor:pointer;}
  select.date-select{background:var(--card); border:1px solid var(--blue);
    border-radius:6px; padding:4px 10px; font-family:monospace;
    font-size:0.80rem; color:var(--white); font-weight:700; min-width:130px;
    text-align:center; cursor:pointer;}
  select.date-select.hist{border-color:var(--orange);}

  hr{border:none; border-top:1px solid var(--border); margin:8px 0;}

  /* Layout */
  .main{display:grid; grid-template-columns:1fr 1fr; gap:20px;}

  /* Chart panel */
  #chart{width:100%; height:520px;}

  /* Slider */
  .slider-wrap{margin-top:6px;}
  .slider-label{color:var(--grey); font-size:0.58rem; font-weight:700;
    letter-spacing:0.10em; text-transform:uppercase; margin-bottom:3px;}
  .slider-date{color:var(--orange); font-size:0.85rem; font-weight:700;
    text-align:center; margin-bottom:4px; font-family:monospace;}
  .slider-row{display:flex; align-items:center; gap:12px;}
  input[type=range]{
    -webkit-appearance:none; appearance:none;
    flex:1; height:4px; border-radius:2px;
    background:var(--border); outline:none; cursor:pointer;
  }
  input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none; appearance:none;
    width:18px; height:18px; border-radius:50%;
    background:var(--orange); border:2px solid var(--white); cursor:pointer;
  }
  input[type=range]::-moz-range-thumb{
    width:18px; height:18px; border-radius:50%;
    background:var(--orange); border:2px solid var(--white); cursor:pointer;
  }
  .play-btn{
    background:var(--card); border:1px solid var(--border); color:var(--white);
    border-radius:6px; width:38px; height:32px; font-size:0.9rem;
    cursor:pointer; transition:all .15s;
  }
  .play-btn:hover{border-color:var(--blue); color:var(--blue);}
  .play-btn.playing{border-color:var(--orange); color:var(--orange);}

  /* Metrics */
  .metrics-label{color:var(--grey); font-size:0.58rem; font-weight:700;
    letter-spacing:0.10em; text-transform:uppercase; margin:6px 0 4px 0;}
  .metric-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:6px;}
  .metric-grid.two{grid-template-columns:repeat(2,1fr);}
  .metric{background:var(--card); border:1px solid var(--border);
    border-radius:6px; padding:6px 8px;}
  .metric .m-label{color:var(--grey); font-size:0.58rem; font-weight:600;
    text-transform:uppercase; letter-spacing:0.04em;}
  .metric .m-value{color:var(--white); font-size:0.88rem; font-weight:700; margin-top:2px;}
  .metric .m-delta{font-size:0.58rem; margin-top:1px;}
  .up{color:var(--green);} .down{color:var(--orange);}

  /* CB cards */
  .cb-cards{display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:2px;}
  .cb-card{background:var(--card); border:1px solid var(--border);
    border-radius:8px; padding:8px 10px; border-left:3px solid;}
  .cb-card-title{font-size:0.54rem; font-weight:700; letter-spacing:0.09em;
    text-transform:uppercase; margin-bottom:5px;}
  .cb-line{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:3px;}
  .cb-line-label{color:var(--grey); font-size:0.62rem;}
  .cb-line-value{font-size:0.70rem; font-weight:700; font-family:monospace;}
  .cb-note{color:var(--grey-dim); font-size:0.62rem; margin-top:4px; line-height:1.4;}

  .ctx-note{margin-top:10px; padding:8px 14px; background:var(--card);
    border-left:3px solid; border-radius:4px;}
  .ctx-note span{color:var(--grey); font-size:0.74rem;}
</style>
</head>

  <div class="main">

  </div>

// ── Cubic spline interpolation (natural) ──────────────────────────────────────
function spline(xs, ys, xnew){
  const n = xs.length;
  if(n<3) return xnew.map(x=>{
    // linear fallback
    for(let i=0;i<n-1;i++){if(x>=xs[i]&&x<=xs[i+1]){
      const t=(x-xs[i])/(xs[i+1]-xs[i]); return ys[i]+t*(ys[i+1]-ys[i]);}}
    return ys[n-1];
  });
  // build second derivatives
  const u=new Array(n).fill(0), y2=new Array(n).fill(0);
  for(let i=1;i<n-1;i++){
    const sig=(xs[i]-xs[i-1])/(xs[i+1]-xs[i-1]);
    const p=sig*y2[i-1]+2; y2[i]=(sig-1)/p;
    u[i]=(ys[i+1]-ys[i])/(xs[i+1]-xs[i])-(ys[i]-ys[i-1])/(xs[i]-xs[i-1]);
    u[i]=(6*u[i]/(xs[i+1]-xs[i-1])-sig*u[i-1])/p;
  }
  for(let k=n-2;k>=0;k--) y2[k]=y2[k]*y2[k+1]+u[k];
  return xnew.map(x=>{
    let lo=0, hi=n-1;
    while(hi-lo>1){const k=(hi+lo)>>1; if(xs[k]>x)hi=k; else lo=k;}
    const h=xs[hi]-xs[lo];
    const a=(xs[hi]-x)/h, b=(x-xs[lo])/h;
    return a*ys[lo]+b*ys[hi]+((a*a*a-a)*y2[lo]+(b*b*b-b)*y2[hi])*(h*h)/6;
  });
}

function ratesArray(snapshot){
  return MATS.map(m=>snapshot.rates[m]);
}
function policyRateAt(cc, dateStr){
  const evs = DATA.countries[cc].events.filter(e=>e.type==="last_change" && e.date<=dateStr);
  if(evs.length){evs.sort((a,b)=>a.date<b.date?-1:1); return evs[evs.length-1].level;}
  const all = DATA.countries[cc].events.filter(e=>e.type==="last_change");
  all.sort((a,b)=>a.date<b.date?-1:1);
  return all.length? all[0].level : null;
}

function fmtDate(iso){
  const d=new Date(iso+"T00:00:00");
  return d.toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"});
}

function draw(){
  const cc = country;
  const snaps = DATA.countries[cc].snapshots;
  const curr = snaps[currIdx[cc]];
  const hist = snaps[histIdx[cc]];
  const color = META[cc].color;

  const xraw = MATS.map(m=>MY[m]);
  const yc = ratesArray(curr), yh = ratesArray(hist);

  // valid pairs
  const pc = xraw.map((x,i)=>[x,yc[i]]).filter(p=>p[1]!==null);
  const ph = xraw.map((x,i)=>[x,yh[i]]).filter(p=>p[1]!==null);

  const xsSmooth = [];
  const N=400, x0=pc[0][0], x1=pc[pc.length-1][0];
  for(let i=0;i<N;i++) xsSmooth.push(x0+(x1-x0)*i/(N-1));
  const ysC = spline(pc.map(p=>p[0]),pc.map(p=>p[1]),xsSmooth);
  const ysH = spline(ph.map(p=>p[0]),ph.map(p=>p[1]),xsSmooth);

  const rateCurr = policyRateAt(cc, curr.date);
  const rateHist = policyRateAt(cc, hist.date);

  // hover customdata
  const matsSorted = MATS.map(m=>[m,MY[m]]).sort((a,b)=>a[1]-b[1]);
  function mlabel(xv){let best=matsSorted[0],bd=1e9;for(const[m,y]of matsSorted){const d=Math.abs(y-xv);if(d<bd){bd=d;best=[m,y];}}return best[0];}
  const custom = xsSmooth.map((x,i)=>{
    const d=(ysC[i]-ysH[i]);
    return [mlabel(x), ysC[i].toFixed(2)+"%", ysH[i].toFixed(2)+"%",
      (d>=0?"+":"")+d.toFixed(2)+" bp",
      rateCurr!==null?rateCurr.toFixed(2)+"%":"n/a",
      rateHist!==null?rateHist.toFixed(2)+"%":"n/a"];
  });

  // label dots
  function dots(map){
    const xs=[],ys=[],tx=[];
    MATS.forEach(m=>{if(LABEL_MATS.has(m)&&map.rates[m]!==null){
      xs.push(MY[m]);ys.push(map.rates[m]);tx.push(map.rates[m].toFixed(2)+"%");}});
    return {xs,ys,tx};
  }
  const dc=dots(curr), dh=dots(hist);

  const traces=[];
  // fill between
  traces.push({x:xsSmooth.concat(xsSmooth.slice().reverse()),
    y:ysC.concat(ysH.slice().reverse()), fill:"toself",
    fillcolor:"rgba(88,166,255,0.06)", line:{color:"rgba(0,0,0,0)"},
    hoverinfo:"skip", showlegend:false});
  // hist line
  traces.push({x:xsSmooth,y:ysH,mode:"lines",
    line:{color:COLORS.orange,width:1.8,dash:"dash"},
    name:"Historical · "+fmtDate(hist.date), hoverinfo:"skip"});
  // hist dots
  traces.push({x:dh.xs,y:dh.ys,mode:"markers+text",
    marker:{color:COLORS.orange,size:7,line:{color:COLORS.panel,width:1.5}},
    text:dh.tx,textposition:"bottom center",
    textfont:{color:COLORS.orange,size:9},hoverinfo:"skip",showlegend:false});
  // current line (hover)
  traces.push({x:xsSmooth,y:ysC,mode:"lines",
    line:{color:color,width:2.4},name:"Current · "+fmtDate(curr.date),
    customdata:custom,
    hovertemplate:"<b>≈ %{customdata[0]}</b><br>─────────────<br>"+
      "<span style='color:"+color+"'>● Curr. yield</span>  %{customdata[1]}<br>"+
      "<span style='color:"+COLORS.orange+"'>● Hist. yield</span>  %{customdata[2]}<br>"+
      "<b>Δ (curr − hist)  %{customdata[3]}</b><br>─────────────<br>"+
      "<span style='color:"+color+"'>▬ Curr. policy</span>  %{customdata[4]}<br>"+
      "<span style='color:"+COLORS.orange+"'>▬ Hist. policy</span>  %{customdata[5]}<extra></extra>"});
  // current dots
  traces.push({x:dc.xs,y:dc.ys,mode:"markers+text",
    marker:{color:color,size:8,line:{color:COLORS.panel,width:1.5}},
    text:dc.tx,textposition:"top center",
    textfont:{color:color,size:9},hoverinfo:"skip",showlegend:false});

  const xspan=[xraw[0],xraw[xraw.length-1]];
  if(rateCurr!==null){
    traces.push({x:xspan,y:[rateCurr,rateCurr],mode:"lines",
      line:{color:color,width:1.3,dash:"dot"},
      name:"Policy (curr.) "+rateCurr.toFixed(2)+"%",hoverinfo:"skip"});
  }
  if(rateHist!==null){
    traces.push({x:xspan,y:[rateHist,rateHist],mode:"lines",
      line:{color:COLORS.orange,width:1.3,dash:"dot"},
      name:"Policy (hist.) "+rateHist.toFixed(2)+"%",hoverinfo:"skip"});
  }

  // y range
  let allY=[...yc,...yh].filter(v=>v!==null);
  if(rateCurr!==null)allY.push(rateCurr);
  if(rateHist!==null)allY.push(rateHist);
  const ymin=Math.min(...allY), ymax=Math.max(...allY);
  const pad=(ymax-ymin)*0.28;

  const annotations=[];

    text:"  "+rateCurr.toFixed(2)+"%",showarrow:false,xanchor:"left",
    font:{color:color,size:9}});
  if(rateHist!==null)annotations.push({x:xraw[xraw.length-1],y:rateHist,

    legend:{font:{color:COLORS.white,size:9.5},bgcolor:"rgba(0,0,0,0)",
      orientation:"h",yanchor:"bottom",y:1.01,xanchor:"left",x:0},

function metricCard(label,value,cls,delta){
  return '<div class="metric"><div class="m-label">'+label+'</div>'+
    '<div class="m-value">'+value+'</div>'+

}

function updateMetrics(curr,hist,cc){
  // spreads
  let html="";

    if(rc===null||rh===null){html+=metricCard(m,"n/a","");return;}
    const d=(rc-rh); const cls=d>0?"up":"down";
    html+=metricCard(m,(d>0?"+":"")+d.toFixed(2)+"bp",cls,(d>0?"↑":"↓")+Math.abs(d).toFixed(2));
  });
  document.getElementById("spreads").innerHTML=html;
  // slopes
  html="";
  [["Curr.",curr],["Hist.",hist]].forEach(([lbl,snap])=>{
    const r2=snap.rates["2Y"], r10=snap.rates["10Y"];
    if(r2===null||r10===null){html+=metricCard(lbl,"n/a","");return;}
    const s=(r10-r2); const cls=s>0?"up":"down";
    html+=metricCard(lbl,(s>0?"+":"")+s.toFixed(2)+"bp",cls,s>0?"↑Nrm":"↓Inv");
  });
  document.getElementById("slopes").innerHTML=html;
  // CB cards
  const meta=META[cc];
  document.getElementById("cb-label").textContent="Central Bank — "+meta.cb;
  const evs=DATA.countries[cc].events;
  const last=evs.find(e=>e.type==="last_change");
  const next=evs.find(e=>e.type==="next_meeting");
  const today=new Date();
  let cbHtml="";
  if(last){
    let bpStr,bpCol;
    if(last.bp!==null){bpStr=(last.bp>0?"+":"")+last.bp+" bp";bpCol=last.bp>0?COLORS.green:COLORS.red||"#F85149";}
    else{bpStr="NEER adj.";bpCol=COLORS.orange;}
    const bpColFinal=last.bp!==null?(last.bp>0?"#3FB950":"#F85149"):"#58A6FF";
    const lvlStr=last.level!==null?last.level.toFixed(2)+"%":"—";
    const daysAgo=Math.round((today-new Date(last.date+"T00:00:00"))/864e5);
    cbHtml+='<div class="cb-card" style="border-left-color:'+bpColFinal+';">'+
      '<div class="cb-card-title" style="color:'+bpColFinal+';">Last Decision</div>'+
      cbLine("Date",fmtDate(last.date),COLORS.white)+
      cbLine("Change",bpStr,bpColFinal)+
      cbLine("Policy rate",lvlStr,COLORS.white)+
      cbLine("Since",daysAgo+"d ago",COLORS.grey)+'</div>';
  }
  if(next){
    const daysTo=Math.round((new Date(next.date+"T00:00:00")-today)/864e5);
    let dlbl;
    if(daysTo>14)dlbl="in "+daysTo+"d";
    else if(daysTo>=0)dlbl="in "+daysTo+"d ⚡";
    else dlbl=Math.abs(daysTo)+"d ago";
    cbHtml+='<div class="cb-card" style="border-left-color:'+COLORS.grey+';">'+
      '<div class="cb-card-title" style="color:'+COLORS.grey+';">Next Meeting</div>'+
      cbLine("Date",fmtDate(next.date),COLORS.white)+
      cbLine("Countdown",dlbl,daysTo>=0&&daysTo<=14?COLORS.orange:COLORS.grey)+
      '<div class="cb-note">'+(next.notes||"")+'</div></div>';
  }
  document.getElementById("cb-cards").innerHTML=cbHtml;
  // ctx note
  const ctx=document.getElementById("ctx-note");
  ctx.style.borderLeftColor=meta.color;
  ctx.querySelector("span").textContent=NOTES[cc]||"";
}
function cbLine(label,value,color){
  return '<div class="cb-line"><span class="cb-line-label">'+label+'</span>'+
    '<span class="cb-line-value" style="color:'+color+';">'+value+'</span></div>';
}

// ── Tabs ──────────────────────────────────────────────────────────────────────
function buildTabs(){
  const el=document.getElementById("tabs");
  el.innerHTML="";
  Object.keys(DATA.countries).forEach(cc=>{
    const b=document.createElement("div");
    b.className="tab"+(cc===country?" active":"");
    b.textContent=cc;
    b.onclick=()=>{country=cc; stopPlay(); syncControls(); draw(); buildTabs();};
    el.appendChild(b);
  });
}

// ── Sync controls to current country ──────────────────────────────────────────
function syncControls(){
  const cc=country, meta=META[cc];
  const snaps=DATA.countries[cc].snapshots;
  document.getElementById("country-name").textContent=meta.name+" Sovereign Curve";
  const pill=document.getElementById("cb-pill");
  pill.textContent=meta.cb; pill.style.color=meta.color; pill.style.borderColor=meta.color;
  document.getElementById("currency-note").textContent=meta.currency+" · Local currency";
  // current select
  const sel=document.getElementById("curr-select");
  sel.innerHTML="";
  snaps.forEach((s,i)=>{
    const o=document.createElement("option");
    o.value=i; o.textContent=fmtDate(s.date);
    if(i===currIdx[cc])o.selected=true;
    sel.appendChild(o);
  });
  sel.onchange=()=>{currIdx[cc]=+sel.value; draw();};
  // historical date dropdown (top-right)
  const hsel=document.getElementById("hist-select");
  hsel.innerHTML="";
  snaps.forEach((s,i)=>{
    const o=document.createElement("option");
    o.value=i; o.textContent=fmtDate(s.date);
    if(i===histIdx[cc])o.selected=true;
    hsel.appendChild(o);
  });
  hsel.onchange=()=>{
    histIdx[cc]=+hsel.value;
    document.getElementById("hist-slider").value=histIdx[cc];  // sync slider
    draw();
  };
  // slider
  const sld=document.getElementById("hist-slider");
  sld.max=snaps.length-1;
  sld.value=histIdx[cc];
}

// ── Slider: fires on EVERY movement (input event) ─────────────────────────────
document.getElementById("hist-slider").addEventListener("input",e=>{
  histIdx[country]=+e.target.value;
  draw();   // ← redraws on every pixel of drag = live animation
});

// ── Play button ───────────────────────────────────────────────────────────────
function stopPlay(){
  playing=false;
  if(playTimer){clearInterval(playTimer);playTimer=null;}
  const btn=document.getElementById("play-btn");
  btn.textContent="▶"; btn.classList.remove("playing");
}
document.getElementById("play-btn").addEventListener("click",()=>{
  const btn=document.getElementById("play-btn");
  if(playing){stopPlay();return;}
  playing=true; btn.textContent="⏸"; btn.classList.add("playing");
  const snaps=DATA.countries[country].snapshots;
  if(histIdx[country]>=snaps.length-1)histIdx[country]=0;
  playTimer=setInterval(()=>{
    if(histIdx[country]>=snaps.length-1){stopPlay();return;}
    histIdx[country]++;
    document.getElementById("hist-slider").value=histIdx[country];
    draw();
  },350);
});

// ── Init ──────────────────────────────────────────────────────────────────────
buildTabs();
syncControls();
draw();
</script>
</body>
</html>
